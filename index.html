<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Hub — Native Google Engine</title>
    <style>
        /* Fullscreen Modern Layout */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .chat-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999; 
        }

        .chat-wrapper .chat-container {
            width: 100%;
            height: 100%; 
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-wrapper .chat-header {
            background: #0f172a; 
            color: white !important;
            padding: 20px; 
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .chat-wrapper .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8fafc;
        }

        .chat-wrapper .message {
            padding: 12px 16px;
            max-width: 78%;
            word-wrap: break-word;
            font-size: 15px;
            margin: 4px 0;
            line-height: 1.5;
        }

        .chat-wrapper .user-msg {
            background: #4f46e5; 
            color: white !important;
            align-self: flex-end;
            border-radius: 18px 18px 2px 18px;
        }

        .chat-wrapper .bot-msg {
            background: #ffffff;
            color: #0f172a !important;
            align-self: flex-start;
            border-radius: 18px 18px 18px 2px;
            border: 1px solid #e2e8f0;
        }

        .chat-wrapper .chat-input-area {
            display: flex;
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            gap: 12px;
            align-items: center;
        }

        .chat-wrapper input {
            flex: 1;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 24px;
            outline: none;
            font-size: 15px;
            padding-left: 20px;
            background: #f8fafc;
        }

        .chat-wrapper button {
            background: #0f172a;
            color: white !important;
            border: none;
            padding: 0 24px;
            height: 48px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
        }

        #mic-btn {
            background: #10b981; 
            font-size: 18px;
            padding: 0;
            width: 48px;
            min-width: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #mic-btn.recording {
            background: #ef4444; 
            animation: puterVoicePulse 1.5s infinite;
        }

        .chat-wrapper .loading {
            color: #64748b;
            align-self: flex-start;
            font-size: 14px;
        }

        @keyframes puterVoicePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <div class="chat-container">
        <div class="chat-header">Gemini Hub — Native Google Engine Project </div>
        <div class="chat-messages" id="chat-box">
            <div class="message bot-msg">System initialized. Advanced Multimodal audio capture active for Firefox/Chrome/Safari.</div>
        </div>
        <div class="chat-input-area">
            <button id="mic-btn" type="button">🎙️</button>
            <input autocomplete="off" id="user-input" placeholder="Type your message here..." type="text"/>
            <button id="send-btn" type="button">Send</button>
        </div>
    </div>
</div>

<script>
(function() {
    // Put your Google AI Studio API key here
    const API_KEY = "your-key"; 
    const conversationHistory = [];
    
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let localStream;

    const checkElements = setInterval(function() {
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');

        if (chatBox && userInput && sendBtn && micBtn) {
            clearInterval(checkElements);
            initChatbot(chatBox, userInput, sendBtn, micBtn);
        }
    }, 100);

    function initChatbot(chatBox, userInput, sendBtn, micBtn) {
        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + className;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-msg');
            userInput.value = '';
            conversationHistory.push({ role: 'user', parts: [{ text: text }] });

            executeGeminiCall();
        }

        async function sendVoiceToGemini(base64Data, mimeType) {
            appendMessage('🎙️ [Voice Note Sent]', 'user-msg');
            userInput.placeholder = "Type your message here...";
            
            conversationHistory.push({
                role: 'user',
                parts: [{
                    inlineData: {
                        mimeType: mimeType,
                        data: base64Data
                    }
                }]
            });

            executeGeminiCall();
        }

        async function executeGeminiCall() {
            const loadingDiv = appendMessage('Processing query & searching web...', 'loading');

            try {
                const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: conversationHistory,
                        tools: [{ google_search: {} }]
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || 'HTTP Error ' + response.status);
                }

                const data = await response.json();
                loadingDiv.remove();
                
                const botReply = data.candidates[0].content.parts[0].text;
                appendMessage(botReply, 'bot-msg');
                conversationHistory.push({ role: 'model', parts: [{ text: botReply }] });

            } catch (error) {
                loadingDiv.remove();
                appendMessage('Error: ' + error.message, 'bot-msg');
                console.error(error);
            }
        }

        // --- CROSS-BROWSER MULTIMODAL AUDIO CAPTURE ENGINE ---
        micBtn.addEventListener('click', async function() {
            if (isRecording) {
                isRecording = false;
                micBtn.classList.remove('recording');
                micBtn.innerText = '🎙️';
                userInput.placeholder = "Processing voice note...";
                
                if (mediaRecorder) mediaRecorder.stop();
                if (localStream) localStream.getTracks().forEach(track => track.stop());
            } else {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    appendMessage("System Error: Your browser layout blocks hardware media input interfaces.", "bot-msg");
                    return;
                }
                
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(localStream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = function(e) {
                        if (e.data.size > 0) audioChunks.push(e.data);
                    };
                    
                    mediaRecorder.onstop = function() {
                        const rawMimeType = mediaRecorder.mimeType || 'audio/webm';
                        const cleanMimeType = rawMimeType.split(';')[0]; 
                        
                        const blob = new Blob(audioChunks, { type: rawMimeType });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = function() {
                            const base64Data = reader.result.split(',')[1];
                            sendVoiceToGemini(base64Data, cleanMimeType);
                        };
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    micBtn.classList.add('recording');
                    micBtn.innerText = '🛑';
                    userInput.placeholder = "Listening... Click stop button when finished.";
                } catch (err) {
                    appendMessage("Microphone capture access denied: " + err.message, "bot-msg");
                }
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    }
})();
</script>

</body>
</html>
